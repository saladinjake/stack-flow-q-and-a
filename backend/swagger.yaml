openapi: 3.0.0
info:
  title: DevFlow API
  description: API documentation for the DevFlow Developer Q&A Platform
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local development server
paths:
  /health:
    get:
      summary: API health check
      responses:
        '200':
          description: API is healthy
  /questions:
    get:
      summary: Get all questions
      responses:
        '200':
          description: List of questions
    post:
      summary: Ask a new question
      responses:
        '201':
          description: Question created
  /questions/{id}:
    get:
      summary: Get question details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Question object
  /answers:
    post:
      summary: Post an answer
      responses:
        '201':
          description: Answer created
  /answers/{id}/vote:
    patch:
      summary: Vote on an answer
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Answer updated with new vote count
